name: lockfile-debug

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: npm ci (expected to fail, just to capture log)
        run: npm ci
        continue-on-error: true

      - name: npm install (regenerate lockfile)
        run: npm install

      - name: upload regenerated lockfile
        uses: actions/upload-artifact@v4
        with:
          name: package-lock
          path: package-lock.json

      - name: npm ci with regenerated lockfile
        run: |
          rm -rf node_modules
          npm ci
